name: main

on:
    push:
      paths-ignore:
       - .github/**
      branches:
        - main

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      DATABRICKS_HOST: ${{ secrets.DEV_DEVELOPMENT_TARGET_URL }}
      DATABRICKS_TOKEN: ${{ secrets.DEV_DEVELOPMENT_TARGET_TOKEN }}
      REPO_PATH: /Workspace/Users/tamraj.dhvaj@zohomail.in/DEV-CICD-DATABRICKS-PROJECT

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: 3.8
          
      - name: set up Databrick CLI
        uses: databricks/setup-cli@main

      - name: Extract branch name
        id: extract_branch_dev
        run: echo "branch=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_OUTPUT

      - name: Upate Databricks Repo (Dev)
        run: databricks repos update "${{env.REPO_PATH}}"\
            --branch "${{ steps.extract_branch.outputs.branch}}"
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    env:
          DATABRICKS_HOST: ${{ secrets.PROD_DEVELOPMENT_TARGET_URL }}
          DATABRICKS_TOKEN: ${{ secrets.PROD_DEVELOPMENT_TARGET_TOKEN }}
          REPO_PATH: /Workspace/Users/tamraj.dhvaj@zohomail.in/PROD-CICD-DATABRICKS-PROJECT
    
        steps:
          - name: Checkout repository
            uses: actions/checkout@v3
    
          - name: Set up Python
            uses: actions/setup-python@v3
            with:
              python-version: 3.8
              
          - name: set up Databrick CLI
            uses: databricks/setup-cli@main
    
          - name: Extract branch name
            id: extract_branch_prod
            run: echo "branch=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_OUTPUT
    
          - name: Upate Databricks Repo (Prod)
            run: databricks repos update "${{env.REPO_PATH}}"\
                --branch "${{ steps.extract_branch.outputs.branch}}"
