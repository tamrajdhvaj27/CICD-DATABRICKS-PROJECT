name: Deploy Sales Notebook to Databricks

on:
    push:
      paths-ignore:
      - .github/**
      branches:
        - main

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      REPO_PATH: ${{vars.DEV_REPOS_PATH}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Databricks CLI
        run : |
          pip install databricks-cli
          
      - name: Configure Databrick Dev
        run: |
          databricks configure --token <<EOF
          ${{ secrets.DEV_DEPLOYMENT_TARGET_URL }}
          ${{ secrets.DEV_DEPLOYMENT_TARGET_TOKEN }}
          EOF

      - name: Extract branch name
        id: extract_branch_dev
        run: echo "branch=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_OUTPUT

      - name: Upate Databricks Repo (Dev)
        run: databricks repos update "${{env.REPO_PATH}}" --branch "${{ steps.extract_branch_dev.outputs.branch}}"
